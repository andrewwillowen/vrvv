# ============================================================================
#
# For details on Zensical configuration, see
# https://zensical.org/docs/setup
# Based on default configuration generated in Zensical 0.0.51
#
# ============================================================================

[project]
site_name = "vrvv Documentation"
site_description = "Implementation of vibration-rotation Van Vleck theory."
site_author = "andrew.will.owen"
site_url = "https://andrewwillowen.github.io/vrvv/"
copyright = """
Copyright &copy; 2026 The authors
"""

# Connect to GitHub repo
repo_url = "https://github.com/andrewwillowen/vrvv"
repo_name = "andrewwillowen/vrvv"
edit_uri = "edit/main/docs"

# Using default navigation for now.
#
# Read more: https://zensical.org/docs/setup/navigation/
# nav = [
#   { "Get started" = "index.md" },
#   { "Markdown in 5min" = "markdown.md" },
# ]

# Read more: https://zensical.org/docs/customization/#additional-css
extra_css = [
    # For KaTeX
    "https://unpkg.com/katex@0/dist/katex.min.css",
    "assets/stylesheets/extra.css",
]

# Read more: https://zensical.org/docs/customization/#additional-javascript
extra_javascript = [
    # For KaTeX
    "javascripts/katex.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js",
]

# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

#[project.theme.font]
#text = "Inter"
#code = "Jetbrains Mono"

# https://zensical.org/docs/setup/colors/
[[project.theme.palette]]
primary = "deep purple"
accent = "indigo"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
primary = "deep purple"
accent = "indigo"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# - https://zensical.org/docs/setup/extensions/about
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
